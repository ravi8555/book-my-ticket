services:
   sql_book_tickets_db:
    image: postgres:16
    container_name: sql_book_ticket_cnt
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: book_seats_db  # Default database
    volumes:
      - 'seats_data:/var/lib/postgresql/data'
    # Optional: Add healthcheck
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  seats_data:     